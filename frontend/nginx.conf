# ─────────────────────────────────────────────────────────────────────────────
# Daily Health Tracker -- Nginx Configuration
# Serves the React SPA and proxies /api/* requests to the backend service.
# Handles SPA fallback routing and Server-Sent Events (no buffering).
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name localhost;

    # Root directory for static files (built React app)
    root /usr/share/nginx/html;
    index index.html;

    # ── SPA Fallback ─────────────────────────────────────────────────────────
    # All non-file routes serve index.html so React Router can handle them.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API Proxy ────────────────────────────────────────────────────────────
    # Forward all /api/* requests to the backend FastAPI service.
    # SSE support: disable buffering and caching for real-time streaming.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket / SSE support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Disable buffering for SSE streaming (e.g., chat responses)
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
    }
}
