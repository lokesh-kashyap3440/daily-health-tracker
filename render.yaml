services:
  - type: web
    name: health-tracker-api
    runtime: python
    region: oregon
    plan: free
    buildCommand: |
      # Install Node.js for frontend build (Render Python env doesn't have it)
      curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
      apt-get install -y nodejs
      # Install Python dependencies
      pip install -r backend/requirements.txt
      # Build frontend and copy to backend/static/
      cd frontend && npm ci && npm run build
      mkdir -p ../backend/static && cp -r dist/* ../backend/static/
    startCommand: cd backend && alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1
    healthCheckPath: /api/health
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: info
      - key: CORS_ORIGINS
        value: "https://health-tracker-api.onrender.com"
      - key: RATE_LIMIT_PER_MINUTE
        value: "100"
      - key: RATE_LIMIT_CHAT_PER_MINUTE
        value: "10"
      - key: DEEPSEEK_MODEL
        value: deepseek-chat
      - key: DEEPSEEK_MAX_TOKENS
        value: "1024"
      - key: DEEPSEEK_TEMPERATURE
        value: "0.7"
      - key: DEEPSEEK_TIMEOUT
        value: "30"
      - key: JWT_ACCESS_TOKEN_EXPIRE_MINUTES
        value: "15"
      - key: JWT_REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: JWT_SECRET
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: health-tracker-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: health-tracker-redis
          property: connectionString

  - type: redis
    name: health-tracker-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    region: oregon
    ipAllowList:
      - source: 0.0.0.0/0
        description: everywhere

databases:
  - name: health-tracker-db
    databaseName: healthtracker
    plan: free
    region: oregon
